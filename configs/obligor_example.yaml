# ---------------------------------------------------------------------------
# Obligor — top-level entity that aggregates facility-level data
#
# This config demonstrates:
#   - Using the same underlying table (facility_master) as the facility config,
#     but viewed from the obligor perspective (primary key = obligor_id)
#   - Pre-joining secondary sources before nesting (facility ↔ collateral first,
#     then nesting enriched facilities under each obligor)
#   - Derived aggregation fields using lambda functions over nested sub-entities
#   - Recursive sub-entity processing: Obligor → Facility → Collateral
# ---------------------------------------------------------------------------

entity:
  name: Obligor
  description: "Lending obligor (borrower) entity — aggregates facility-level data"
  version: "1.0"

# ---------------------------------------------------------------------------
# Global parameters — same snapshot_date as the facility config.
# Priority: runtime > source-level > global default.
# ---------------------------------------------------------------------------
parameters:
  snapshot_date: "2025-12-31"

# ---------------------------------------------------------------------------
# Expression packages — Python packages available in eval/lambda expressions.
# Default: {pd: pandas, np: numpy}. Omit to use defaults only.
# ---------------------------------------------------------------------------
expression_packages:
  pd: pandas
  np: numpy

# ---------------------------------------------------------------------------
# Connections — define once, reference by name in sources.
# Avoids repeating credentials when multiple sources use the same Snowflake
# account. The pipeline reuses a single connection object at runtime.
# ---------------------------------------------------------------------------
connections:
  lending_db:
    account: "${SNOWFLAKE_ACCOUNT}"
    database: CREDIT_DB
    schema: LENDING
    warehouse: "${SNOWFLAKE_WH:ANALYTICS_WH}"

# ---------------------------------------------------------------------------
# Sources
#
# The obligor entity is derived from the same facility_master table.
# We load it twice: once for distinct obligor-level attributes (primary),
# and once for the full facility rows that will be nested under each obligor.
# Collateral and rating overrides are loaded for pre-joining into facility rows.
# Both Snowflake sources reference the same connection: lending_db.
# ---------------------------------------------------------------------------
sources:
  - name: obligor_main
    type: snowflake
    primary: true
    connection: lending_db
    query: |
      SELECT DISTINCT obligor_id, legal_name, industry, country,
             revenue, total_assets, total_liabilities, founded_date
      FROM facility_master
      WHERE snapshot_date = '{snapshot_date}'

  - name: facility_detail
    type: snowflake
    connection: lending_db
    query: |
      SELECT facility_id, obligor_id, product_type,
             commitment_amount, outstanding_balance,
             origination_date, maturity_date, interest_rate
      FROM facility_master
      WHERE snapshot_date = '{snapshot_date}'

  - name: collateral
    type: parquet
    path: "data/collateral/{snapshot_date}/*.parquet"

  - name: rating_overrides
    type: csv
    path: "./data/rating_overrides.csv"
    options:
      delimiter: ","
      encoding: "utf-8"

# ---------------------------------------------------------------------------
# Joins — executed in order; each result updates the left source.
#
# Step 1-2: Pre-join collateral and rating overrides INTO facility_detail.
#           After these joins, each facility row has collateral_items (nested
#           DataFrame) and rating_override columns — matching what the
#           facility_example.yaml config expects.
# Step 3:   Nest the enriched facility rows under each obligor (one-to-many).
# ---------------------------------------------------------------------------
joins:
  # Step 1: facility_detail ↔ collateral → adds collateral_items to each facility row
  - left: facility_detail
    right: collateral
    how: left
    "on":
      - left_col: facility_id
        right_col: facility_id
    relationship: one_to_many
    nested_as: collateral_items

  # Step 2: facility_detail ↔ rating_overrides → adds rating columns to each facility row
  - left: facility_detail
    right: rating_overrides
    how: left
    "on":
      - left_col: facility_id
        right_col: facility_id
      - left_col: product_type
        right_col: product_type
    relationship: one_to_one

  # Step 3: obligor_main ↔ enriched facility_detail → nests facilities under each obligor
  - left: obligor_main
    right: facility_detail
    how: left
    "on":
      - left_col: obligor_id
        right_col: obligor_id
    relationship: one_to_many
    nested_as: facilities

fields:
  # ===========================================================================
  # PASS 1 — SOURCE FIELDS
  # Obligor-level attributes from the primary source (obligor_main).
  # ===========================================================================

  - name: obligor_id
    source: obligor_id
    dtype: str
    description: "Unique obligor identifier"
    primary_key: true
    validation_type: [not_null, unique]
    validation_severity:
      not_null: error
      unique: error

  - name: legal_name
    source: legal_name
    dtype: str
    description: "Legal name of the obligor"
    validation_type: [not_null]
    validation_severity:
      not_null: error

  - name: industry
    source: industry
    dtype: str
    fill_na: "UNKNOWN"

  - name: country
    source: country
    dtype: str
    fill_na: "US"

  - name: revenue
    source: revenue
    dtype: float64
    validation_type: [range]
    validation_rule:
      range: [0, null]
    validation_severity:
      range: warning

  - name: total_assets
    source: total_assets
    dtype: float64

  - name: total_liabilities
    source: total_liabilities
    dtype: float64

  - name: founded_date
    source: founded_date
    dtype: datetime

  # Nested facilities — each obligor's facility rows (pre-enriched with collateral
  # and rating overrides via the join chain above).
  # entity_ref: Facility resolves to facility_example.yaml, which defines the full
  # Facility schema including entity_ref: Collateral for recursive processing.
  # Result: each facility instance has a collateral_items attribute (list[Collateral]).
  - name: facilities
    source: facilities
    dtype: nested
    entity_ref: Facility
    description: "One-to-many facility positions (nested — processed as Facility sub-entities)"

  # ===========================================================================
  # PASS 2 — DERIVED FIELDS
  # Obligor-level aggregations computed from the nested facilities DataFrame.
  # At this point facilities is still a pd.DataFrame (sub-entity processing
  # runs after derived fields), so standard DataFrame operations work.
  # ===========================================================================

  - name: facility_count
    derived: "lambda row: len(row['facilities']) if not row['facilities'].empty else 0"
    dtype: int64
    description: "Number of facilities belonging to this obligor"

  - name: total_commitment
    derived: "lambda row: row['facilities']['commitment_amount'].sum() if not row['facilities'].empty else 0.0"
    dtype: float64
    description: "Sum of commitment_amount across all facilities"
    validation_type: [range]
    validation_rule:
      range: [0, null]
    validation_severity:
      range: warning

  - name: total_outstanding
    derived: "lambda row: row['facilities']['outstanding_balance'].sum() if not row['facilities'].empty else 0.0"
    dtype: float64
    description: "Sum of outstanding_balance across all facilities"

  - name: weighted_avg_rate
    derived: >
      lambda row: (
        (row['facilities']['interest_rate'] * row['facilities']['commitment_amount']).sum()
        / row['facilities']['commitment_amount'].sum()
      ) if not row['facilities'].empty and row['facilities']['commitment_amount'].sum() > 0 else 0.0
    dtype: float64
    description: "Commitment-weighted average interest rate across all facilities"
    validation_type: [range]
    validation_rule:
      range: [0.0, 1.0]
    validation_severity:
      range: warning

  - name: total_collateral_value
    derived: >
      lambda row: sum(
        row['facilities'].apply(
          lambda f: f['collateral_items']['collateral_value'].sum()
                    if not f['collateral_items'].empty else 0.0, axis=1
        )
      ) if not row['facilities'].empty else 0.0
    dtype: float64
    description: "Total collateral value across all facilities and their collateral positions"

  - name: debt_to_asset_ratio
    derived: "total_liabilities / total_assets"
    dtype: float64
    description: "Total liabilities divided by total assets"
    validation_type: [range]
    validation_rule:
      range: [0.0, 10.0]
    validation_severity:
      range: warning

  - name: leverage_flag
    derived: "lambda row: 'HIGH' if row['total_liabilities'] > row['total_assets'] else 'NORMAL'"
    dtype: str
    description: "HIGH when liabilities exceed assets, else NORMAL"

# ---------------------------------------------------------------------------
# Post-filters — applied after all field processing (Pass 1 + Pass 2).
# ---------------------------------------------------------------------------
post_filters:
  - "total_assets > 0"

# ---------------------------------------------------------------------------
# Facility sub-entity config — defines the schema for nested Facility
# DataFrames inside Obligor.facilities.
#
# This is NOT a standalone pipeline config. It defines only entity + fields
# for sub-entity processing. The data comes from the parent (Obligor)
# pipeline's one-to-many join.
# ---------------------------------------------------------------------------

entity:
  name: Facility
  description: "Commercial lending facility entity (sub-entity schema)"
  version: "1.0"

fields:
  - name: facility_id
    source: facility_id
    dtype: str
    primary_key: true
    validation_type: [not_null, unique]
    validation_severity:
      not_null: error
      unique: error

  - name: product_category
    source: product_type
    dtype: str
    fill_na: "UNKNOWN"

  - name: commitment_amount
    source: commitment_amount
    dtype: float64
    validation_type: [not_null, range]
    validation_rule:
      range: [0, null]
    validation_severity:
      not_null: error

  - name: outstanding_balance
    source: outstanding_balance
    dtype: float64

  - name: interest_rate
    source: interest_rate
    dtype: float64
    fill_na: 0.0

  - name: origination_date
    source: origination_date
    dtype: datetime

  - name: maturity_date
    source: maturity_date
    dtype: datetime

  - name: rating_override
    source: rating_override
    dtype: str

  - name: collateral_items
    source: collateral_items
    dtype: nested
    entity_ref: Collateral

  - name: utilization_rate
    derived: "outstanding_balance / commitment_amount"
    dtype: float64

  - name: total_collateral_value
    derived: "lambda row: row['collateral_items']['collateral_value'].sum() if not row['collateral_items'].empty else 0.0"
    dtype: float64

  - name: days_to_maturity
    derived: "lambda row: (row['maturity_date'] - row['origination_date']).days"
    dtype: int64
    validation_type: [range]
    validation_rule:
      range: [0, null]
    validation_severity:
      range: error

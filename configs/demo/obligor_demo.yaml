# ---------------------------------------------------------------------------
# Obligor Demo — top-level entity with 3-level nesting (Obligor → Facility → Collateral)
#
# Sources:
#   - obligor_main:     SQLite database
#   - facility_detail:  SQLite database (same DB, different query)
#   - collateral:       Parquet file
#   - rating_overrides: CSV file
#
# Setup:
#   python scripts/generate_sample_data.py
#
# Run:
#   from impact.entity.pipeline import EntityPipeline
#   result = EntityPipeline("configs/demo/obligor_demo.yaml").run()
# ---------------------------------------------------------------------------

entity:
  name: Obligor
  description: "Lending obligor (borrower) entity — aggregates facility-level data (demo)"
  version: "1.0"

parameters:
  snapshot_date: "2025-12-31"
  obligor_table: "obligor_main"
  facility_table: "facility_main"

sources:
  - name: obligor_main
    type: sqlite
    primary: true
    path: "data/sample/lending.db"
    query: |
      SELECT DISTINCT obligor_id, legal_name, industry, country,
             revenue, total_assets, total_liabilities, founded_date
      FROM {obligor_table}
      WHERE snapshot_date = '{snapshot_date}'

  - name: facility_detail
    type: sqlite
    path: "data/sample/lending.db"
    query: |
      SELECT facility_id, obligor_id, product_type,
             commitment_amount, outstanding_balance,
             origination_date, maturity_date, interest_rate
      FROM {facility_table}
      WHERE snapshot_date = '{snapshot_date}'

  - name: collateral
    type: parquet
    path: "data/sample/collateral.parquet"

  - name: rating_overrides
    type: csv
    path: "data/sample/rating_overrides.csv"

joins:
  - left: facility_detail
    right: collateral
    how: left
    "on":
      - left_col: facility_id
        right_col: facility_id
    relationship: one_to_many
    nested_as: collateral_items

  - left: facility_detail
    right: rating_overrides
    how: left
    "on":
      - left_col: facility_id
        right_col: facility_id
      - left_col: product_type
        right_col: product_type
    relationship: one_to_one

  - left: obligor_main
    right: facility_detail
    how: left
    "on":
      - left_col: obligor_id
        right_col: obligor_id
    relationship: one_to_many
    nested_as: facilities

fields:
  # === PASS 1 — SOURCE FIELDS ===

  - name: obligor_id
    source: obligor_id
    dtype: str
    primary_key: true
    validation_type: [not_null, unique]
    validation_severity:
      not_null: error
      unique: error

  - name: legal_name
    source: legal_name
    dtype: str
    validation_type: [not_null]
    validation_severity:
      not_null: error

  - name: industry
    source: industry
    dtype: str
    fill_na: "UNKNOWN"

  - name: country
    source: country
    dtype: str
    fill_na: "US"

  - name: revenue
    source: revenue
    dtype: float64
    validation_type: [range]
    validation_rule:
      range: [0, null]
    validation_severity:
      range: warning

  - name: total_assets
    source: total_assets
    dtype: float64

  - name: total_liabilities
    source: total_liabilities
    dtype: float64

  - name: founded_date
    source: founded_date
    dtype: datetime

  - name: facilities
    source: facilities
    dtype: nested
    entity_ref: Facility

  # === PASS 2 — DERIVED FIELDS ===

  - name: facility_count
    derived: "lambda row: len(row['facilities']) if not row['facilities'].empty else 0"
    dtype: int64

  - name: total_commitment
    derived: "lambda row: row['facilities']['commitment_amount'].sum() if not row['facilities'].empty else 0.0"
    dtype: float64
    validation_type: [range]
    validation_rule:
      range: [0, null]
    validation_severity:
      range: warning

  - name: total_outstanding
    derived: "lambda row: row['facilities']['outstanding_balance'].sum() if not row['facilities'].empty else 0.0"
    dtype: float64

  - name: weighted_avg_rate
    derived: >
      lambda row: (
        (row['facilities']['interest_rate'] * row['facilities']['commitment_amount']).sum()
        / row['facilities']['commitment_amount'].sum()
      ) if not row['facilities'].empty and row['facilities']['commitment_amount'].sum() > 0 else 0.0
    dtype: float64
    validation_type: [range]
    validation_rule:
      range: [0.0, 1.0]
    validation_severity:
      range: warning

  - name: total_collateral_value
    derived: >
      lambda row: sum(
        row['facilities'].apply(
          lambda f: f['collateral_items']['collateral_value'].sum()
                    if not f['collateral_items'].empty else 0.0, axis=1
        )
      ) if not row['facilities'].empty else 0.0
    dtype: float64

  - name: debt_to_asset_ratio
    derived: "total_liabilities / total_assets"
    dtype: float64
    validation_type: [range]
    validation_rule:
      range: [0.0, 10.0]
    validation_severity:
      range: warning

  - name: leverage_flag
    derived: "lambda row: 'HIGH' if row['total_liabilities'] > row['total_assets'] else 'NORMAL'"
    dtype: str

post_filters:
  - "total_assets > 0"
